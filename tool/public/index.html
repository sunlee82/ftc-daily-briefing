<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>브리핑 생성 도구</title>
  <link rel="stylesheet" href="styles.css?v=202607160953" />
</head>
<body>
  <div class="wrap">
    <header class="tool-head">
      <h1>🛠️ 브리핑 생성 도구 <span class="badge">LIVE</span></h1>
      <p>아래 필수 키워드들로 공정거래위원회의 오늘 동향을 정리한 브리핑을 만들어 미리보고 배포합니다.
        <a href="/archive/" target="_blank">공개 아카이브 열기 ↗</a></p>
    </header>

    <!-- 1. 입력 -->
    <section class="panel" id="input-panel">
      <h2>1. 입력</h2>
      <p class="meta-line">모니터링 대상: 공정거래위원회</p>
      <label>필수 검색 키워드 <small>(쉼표로 구분 — 각 키워드로 한 번씩 검색해 다양한 결과를 만듭니다)</small>
        <input id="mandatoryKeywords" type="text" placeholder="예: 공정위, 과징금, 현장조사, 담합" />
      </label>
      <div class="row">
        <label class="sm">수집 기간(시간)
          <input id="windowHours" type="number" value="24" min="1" max="168" />
        </label>
        <label class="sm">조합당 최대 항목
          <input id="maxPerPair" type="number" value="10" min="1" max="30" />
        </label>
        <div class="preset-actions">
          <button class="ghost" id="save-preset" type="button">프리셋 저장</button>
          <button class="ghost" id="load-preset" type="button">프리셋 불러오기</button>
        </div>
      </div>
      <button class="primary" id="generate" type="button">브리핑 생성 ▶</button>
      <p class="status" id="gen-status"></p>
    </section>

    <!-- 2·3. 미리보기 · 편집 -->
    <section class="panel hidden" id="preview-panel">
      <h2>2. 미리보기 · 편집</h2>
      <p class="meta-line" id="meta-line"></p>
      <label>브리핑 제목
        <input id="edit-title" type="text" />
      </label>
      <label>핵심 요약 (카드에 노출)
        <textarea id="edit-summary" rows="3"></textarea>
      </label>
      <div class="refresh-overview-bar">
        <button class="ghost" id="refresh-overview" type="button">🔄 제목·요약 새로고침 (현재 항목 기준)</button>
        <span class="status" id="overview-status"></span>
      </div>

      <h3>항목 <small>(불필요한 항목은 삭제)</small></h3>
      <div id="items"></div>

      <div class="more-search-box">
        <h3>🔄 추가 검색 <small>(현재 결과와 중복·유사한 항목은 자동 제외)</small></h3>
        <label>검색 키워드 <small>(쉼표로 구분, 비우면 전체 동향 검색)</small>
          <input id="moreKeywords" type="text" placeholder="예: 온라인플랫폼, 소비자보호" />
        </label>
        <label>제외 키워드 <small>(쉼표로 구분, 해당 단어가 들어간 결과 제외)</small>
          <input id="moreExcludeKeywords" type="text" placeholder="예: 인사, 채용" />
        </label>
        <div class="more-search-bar">
          <button class="ghost" id="generate-more" type="button">추가 검색 실행</button>
          <span class="status" id="more-status"></span>
        </div>
      </div>

      <div class="publish-bar">
        <button class="primary" id="publish" type="button">배포하기 ▲</button>
        <span class="status" id="pub-status"></span>
      </div>
    </section>
  </div>
  <script src="app.js?v=202607160953"></script>
</body>
</html>
